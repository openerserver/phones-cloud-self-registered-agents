name: 功能建议
description: 提出面向 Windows、macOS 或 Android 客户端的改进建议
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议。请描述实际使用场景和要解决的问题，避免只给出功能名称。

  - type: dropdown
    id: client
    attributes:
      label: 相关客户端
      multiple: true
      options:
        - Windows Agent
        - Mac Agent
        - Android Tunnel Client
        - Web 设备控制台
        - 跨平台 / 通用
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 谁会在什么情况下使用这项能力？
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 当前问题
      description: 目前的流程有什么限制、成本或风险？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请说明期望的行为或交互方式。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已尝试的替代方案
      description: 不需要时可以留空。

  - type: checkboxes
    id: confirmation
    attributes:
      label: 提交前确认
      options:
        - label: 我已经搜索过现有 Issue，没有发现相同建议。
          required: true
        - label: 此建议不包含安全漏洞、账号、订单或隐私数据。
          required: true
